    - name: carrefinho
      url-base: https://github.com/carrefinho
    - name: prospector
      url-base: https://github.com/t-ogura
    - name: geeksville
      url-base: https://github.com/geeksville
    - name: janpfischer
      url-base: https://github.com/Dexter-KBD
    - name: kot149
